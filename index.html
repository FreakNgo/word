<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Docs - Premium Word Processor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --ms-blue: #185abd;
            --ribbon-bg: #f3f2f1;
            --toolbar-bg: #ffffff;
            --border-color: #d2d0ce;
            --page-bg: #eaeaea;
            --text-dark: #323130;
            --hover-bg: #edebe9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #05050a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: transform 0.6s cubic-bezier(0.1, 1, 0.1, 1), opacity 0.4s ease;
        }

        .cinematic-text {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(
                90deg, 
                #ff5252, #ff793f, #ffb142, #33d9b2, #34ace0, #706fd3, #ff5252
            );
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: liquidRainbow 3s linear infinite, scaleIntro 3s cubic-bezier(0.1, 1, 0.1, 1) forwards;
            text-align: center;
        }

        @keyframes liquidRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        @keyframes scaleIntro {
            0% { transform: scale(0.85); opacity: 0; filter: blur(12px); }
            20% { opacity: 1; filter: blur(0px); }
            80% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- MAIN APPLICATION INTERFACE --- */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            background-color: var(--ms-blue);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .ribbon {
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .ribbon-tabs {
            display: flex;
            background: #faf9f8;
            padding-left: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            color: #595959;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            border-bottom: 3px solid var(--ms-blue);
            color: var(--ms-blue);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background-color: var(--ribbon-bg);
            align-items: center;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            border-right: 1px solid #d2d0ce;
            padding-right: 10px;
            margin-right: 4px;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background-color: var(--hover-bg);
            border: 1px solid #c8c6c4;
        }

        select {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-family: inherit;
            font-size: 13px;
            height: 32px;
            outline: none;
        }

        .color-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 700;
        }

        input[type="color"] {
            border: none;
            width: 28px;
            height: 20px;
            cursor: pointer;
            background: transparent;
        }

        /* CHART SELECTION DROPDOWN MENU */
        .chart-menu-container {
            position: relative;
            display: inline-block;
        }

        .chart-dropdown-options {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            z-index: 1000;
        }

        .chart-dropdown-options button {
            color: var(--text-dark);
            padding: 10px 14px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .chart-dropdown-options button:hover {
            background-color: var(--hover-bg);
        }

        /* WORKSPACE SHEET */
        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .page {
            background-color: white;
            width: 100%;
            max-width: 812px;
            min-height: 1048px;
            padding: 90px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            outline: none;
            font-size: 16px;
            line-height: 1.6;
            color: #000000;
            word-wrap: break-word;
        }

        /* Target inserted charts or images specifically */
        .page img {
            max-width: 100%;
            height: auto;
            margin: 15px 0;
            border-radius: 4px;
            display: block;
        }

        /* HIDDEN WORKSPACE ENGINE FOR RENDER STACKS */
        #img-upload {
            display: none;
        }
        
        #canvas-holder {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
        }

        /* RESPONSIVE SCALING PRESETS */
        @media (max-width: 768px) {
            .workspace { padding: 8px; }
            .page { padding: 25px; min-height: auto; }
            .toolbar { padding: 8px; gap: 4px; }
            .tool-group { border-right: none; padding-right: 0; margin-right: 0; }
            .cinematic-text { font-size: 42px; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="cinematic-text">ANTIFY</div>
    </div>

    <div id="app-container">
        <div class="header">
            <span>Antify Word Processor</span>
            <span style="font-size: 11px; opacity: 0.8;">Cloud Sandbox Engine</span>
        </div>

        <div class="ribbon">
            <div class="ribbon-tabs">
                <div class="tab active">Home</div>
                <div class="tab" onclick="document.getElementById('img-upload').click()">🖼️ Insert Image</div>
                
                <div class="chart-menu-container">
                    <div class="tab" style="color: var(--ms-blue); font-weight: bold;" onclick="toggleChartDropdown(event)">📊 Insert Chart ▾</div>
                    <div class="chart-dropdown-options" id="chartDropdownMenu">
                        <button onclick="generateSystemChart('bar')">📊 Bar Chart</button>
                        <button onclick="generateSystemChart('pie')">🍕 Pie Chart</button>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn" onclick="executeAction('undo')" title="Undo">↩️</button>
                    <button class="tool-btn" onclick="executeAction('redo')" title="Redo">↪️</button>
                </div>

                <div class="tool-group">
                    <select id="fontName" onchange="executeAction('fontName', this.value)">
                        <option value="Arial" selected>Arial</option>
                        <option value="Calibri">Calibri</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Impact">Impact</option>
                        <option value="Courier New">Courier New</option>
                    </select>

                    <select id="fontSize" onchange="executeAction('fontSize', this.value)">
                        <option value="2">12px (Small)</option>
                        <option value="3" selected>16px (Normal)</option>
                        <option value="4">18px (Medium)</option>
                        <option value="5">24px (Large)</option>
                        <option value="6">32px (X-Large)</option>
                        <option value="7">48px (Heading)</option>
                    </select>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" style="font-weight:800;" onclick="executeAction('bold')">B</button>
                    <button class="tool-btn" style="font-style:italic;" onclick="executeAction('italic')">I</button>
                    <button class="tool-btn" style="text-decoration:underline;" onclick="executeAction('underline')">U</button>
                    <button class="tool-btn" onclick="executeAction('strikeThrough')"><s>S</s></button>
                </div>

                <div class="tool-group">
                    <div class="color-wrapper">
                        <span>Font</span>
                        <input type="color" onchange="executeAction('foreColor', this.value)">
                    </div>
                    <div class="color-wrapper">
                        <span>Highlight</span>
                        <input type="color" value="#ffff00" onchange="executeAction('hiliteColor', this.value)">
                    </div>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" onclick="executeAction('insertUnorderedList')">• Bullets</button>
                    <button class="tool-btn" onclick="executeAction('insertOrderedList')">1. Numbers</button>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" onclick="executeAction('justifyLeft')">⫷ Left</button>
                    <button class="tool-btn" onclick="executeAction('justifyCenter')">☰ Center</button>
                    <button class="tool-btn" onclick="executeAction('justifyRight')">⫸ Right</button>
                </div>
            </div>
        </div>

        <input type="file" id="img-upload" accept="image/*">
        <div id="canvas-holder">
            <canvas id="renderChartCanvas" width="600" height="350"></canvas>
        </div>

        <div class="workspace">
            <div class="page" id="text-canvas" contenteditable="true" spellcheck="true">
                <p>Welcome to Antify Docs! Start writing your document here...</p>
            </div>
        </div>
    </div>

    <script>
        function executeAction(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('text-canvas').focus();
        }

        // Toggle Chart Dropdown Options Window Menu Setup
        function toggleChartDropdown(event) {
            event.stopPropagation();
            const menu = document.getElementById('chartDropdownMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        // Close dropdown when clicking outside
        window.addEventListener('click', () => {
            document.getElementById('chartDropdownMenu').style.display = 'none';
        });

        // Intro screen layer dismisses cleanly
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                if (intro) {
                    intro.style.opacity = '0';
                    intro.style.transform = 'translateY(-100vh)';
                    setTimeout(() => {
                        intro.style.display = 'none';
                        document.getElementById('text-canvas').focus();
                    }, 600);
                }
            }, 3000);
        });

        // Image Selection Stream Reader Configuration
        document.getElementById('img-upload').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                const fileReader = new FileReader();
                fileReader.onload = function(event) {
                    executeAction('insertImage', event.target.result);
                };
                fileReader.readAsDataURL(this.files[0]);
            }
            this.value = '';
        });

        // Real Raw Graphical Dynamic Multi-Chart Engine (Supports Bar & Pie Routing)
        function generateSystemChart(chartType) {
            // Close selection window menu
            document.getElementById('chartDropdownMenu').style.display = 'none';

            const canvas = document.getElementById('renderChartCanvas');
            const context = canvas.getContext('2d');

            if (window.activeChartInstance) {
                window.activeChartInstance.destroy();
            }

            // Flush out background completely to clean solid white canvas profile container profiles
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = "#ffffff";
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Chart Configuration Matrix Mapping Data Sheets
            const chartData = {
                labels: ['Product A', 'Product B', 'Product C', 'Product D', 'Product E'],
                datasets: [{
                    label: 'Market Sales Distribution (%)',
                    data: [35, 25, 15, 15, 10],
                    backgroundColor: [
                        'rgba(24, 90, 189, 0.85)',
                        'rgba(54, 162, 235, 0.85)',
                        'rgba(255, 99, 132, 0.85)',
                        'rgba(75, 192, 192, 0.85)',
                        'rgba(255, 206, 86, 0.85)'
                    ],
                    borderColor: [
                        'rgba(24, 90, 189, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 99, 132, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(255, 206, 86, 1)'
                    ],
                    borderWidth: 2
                }]
            };

            // Build instance targeting selected chart mapping path
            window.activeChartInstance = new Chart(context, {
                type: chartType,
                data: chartData,
                options: {
                    responsive: false,
                    animation: false,
                    plugins: {
                        title: { 
                            display: true, 
                            text: chartType === 'bar' ? 'Sales Revenue Report (Bar Overview)' : 'Sales Share Report (Pie Distribution)', 
                            font: { size: 16, weight: 'bold' } 
                        },
                        legend: {
                            display: true,
                            position: 'bottom'
                        }
                    }
                }
            });

            // Convert to snapshot data image schema string structure and inject cleanly inside document layout stack
            const snapshotUrl = canvas.toDataURL('image/png');
            executeAction('insertImage', snapshotUrl);
            
            // Add spacing break blocks behind chart layer securely
            executeAction('insertHTML', '<br><p></p>');
        }

        // Tab hook spacing injection mapper
        document.getElementById('text-canvas').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                executeAction('insertHTML', '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;');
            }
        });
    </script>
</body>
</html>
