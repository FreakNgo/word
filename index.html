<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Docs - Premium Word Processor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --ms-blue: #185abd;
            --ribbon-bg: #f3f2f1;
            --toolbar-bg: #ffffff;
            --border-color: #d2d0ce;
            --page-bg: #eaeaea;
            --text-dark: #323130;
            --hover-bg: #edebe9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- BULLETPROOF OVERLAY INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #05050a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999; /* Boosted to absolute top layer */
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .cinematic-text {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #ff5252, #ff793f, #ffb142, #33d9b2, #34ace0, #706fd3, #ff5252);
            background-size: 300% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: liquidRainbow 3s linear infinite;
            text-align: center;
            margin-bottom: 20px;
        }

        .skip-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @keyframes liquidRainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* --- APP CONTAINER SYSTEM --- */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            background-color: var(--ms-blue);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .ribbon {
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .ribbon-tabs {
            display: flex;
            background: #faf9f8;
            padding-left: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            color: #595959;
            border-bottom: 3px solid transparent;
            user-select: none;
        }

        .tab.active {
            border-bottom: 3px solid var(--ms-blue);
            color: var(--ms-blue);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background-color: var(--ribbon-bg);
            align-items: center;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            border-right: 1px solid #d2d0ce;
            padding-right: 10px;
            margin-right: 4px;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background-color: var(--hover-bg);
            border: 1px solid #c8c6c4;
        }

        select {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-family: inherit;
            font-size: 13px;
            height: 32px;
            outline: none;
        }

        /* SHEET VIEWPORT ARCHITECTURE */
        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .page {
            background-color: white;
            width: 100%;
            max-width: 812px;
            min-height: 1048px;
            padding: 90px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            outline: none;
            font-size: 16px;
            line-height: 1.6;
            color: #000000;
            word-wrap: break-word;
        }

        /* --- STYLISH EDTIABLE CHART CONTAINER --- */
        .chart-wrapper-box {
            width: 100%;
            max-width: 520px;
            margin: 20px auto;
            background: #ffffff;
            padding: 15px;
            border: 2px dashed #185abd;
            border-radius: 8px;
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        .chart-wrapper-box:hover {
            border-color: #ff5252;
            background-color: #fafafa;
        }
        
        .chart-wrapper-box::before {
            content: '⚡ Click Graph to Edit Data';
            position: absolute;
            top: -12px;
            right: 15px;
            background: #185abd;
            color: white;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- IN-CHART POPUP EDIT MODAL --- */
        .custom-modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.5);
            z-index: 200000;
            justify-content: center;
            align-items: center;
        }

        .modal-body-box {
            background: white;
            padding: 24px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid var(--border-color);
        }

        .modal-body-box h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--ms-blue);
        }

        .data-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .data-input-row input {
            padding: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            outline: none;
        }

        .data-input-row input[type="text"] { flex: 2; }
        .data-input-row input[type="number"] { flex: 1; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }

        .modal-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .modal-btn.save { background: var(--ms-blue); color: white; }
        .modal-btn.cancel { background: #edebe9; color: var(--text-dark); border-color: var(--border-color); }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="cinematic-text">ANTIFY</div>
        <button type="button" class="skip-btn" onclick="dismissIntroOverlay()">Skip Intro &rarr;</button>
    </div>

    <div class="custom-modal-backdrop" id="editorModal">
        <div class="modal-body-box">
            <h3>📈 Edit Chart Labels & Values</h3>
            <div id="inputRowsContainer"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditorModal()">Cancel</button>
                <button class="modal-btn save" onclick="saveChartDataChanges()">Update Graph</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <div class="header">
            <span>Antify Word Processor</span>
            <span style="font-size: 11px; opacity: 0.8;">Cloud Sandbox Engine</span>
        </div>

        <div class="ribbon">
            <div class="ribbon-tabs">
                <div class="tab active">Home</div>
                
                <div class="chart-menu-container">
                    <div class="tab" style="color: var(--ms-blue); font-weight: bold;" onclick="toggleChartDropdown(event)">📊 Insert Chart ▾</div>
                    <div class="chart-dropdown-options" id="chartDropdownMenu">
                        <button type="button" onclick="insertDirectChart('bar')">📊 Bar Chart</button>
                        <button type="button" onclick="insertDirectChart('pie')">🍕 Pie Chart</button>
                    </div>
                </div>
            </div>

            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn" onclick="executeAction('undo')">↩️</button>
                    <button class="tool-btn" onclick="executeAction('redo')">↪️</button>
                </div>

                <div class="tool-group">
                    <select id="fontSizeSelection" onchange="changeSelectionFontSize(this.value)">
                        <option value="12px">12px</option>
                        <option value="16px" selected>16px</option>
                        <option value="24px">24px</option>
                        <option value="32px">32px</option>
                    </select>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" style="font-weight:800;" onclick="executeAction('bold')">B</button>
                    <button class="tool-btn" style="font-style:italic;" onclick="executeAction('italic')">I</button>
                    <button class="tool-btn" style="text-decoration:underline;" onclick="executeAction('underline')">U</button>
                </div>
            </div>
        </div>

        <div class="workspace">
            <div class="page" id="text-canvas" contenteditable="true" spellcheck="true">
                <p>Welcome to Antify Docs! Start writing your document here...</p>
            </div>
        </div>
    </div>

    <script>
        /* --- 1. CRITICAL PRI
