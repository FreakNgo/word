<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Word Processor</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --office-blue: #0f52ba; 
            --border-muted: #d2d0ce;
            --surface-bg: #e1e1e1;
            --text-dark: #323130;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--surface-bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- CINEMATIC RAINBOW INTRO OVERLAY --- */
        .cinematic-intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0c10; /* Deep cinematic dark backdrop */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999999; /* Higher than any modal */
            opacity: 1;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .cinematic-text {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-family: 'Segoe UI', Arial, sans-serif;
            
            /* Rainbow Gradient Fill Core Mechanics */
            background: linear-gradient(
                to right, 
                #ff3333, #ff9933, #ffff33, #33cc33, #3399ff, #9933ff, #ff33cc, #ff3333
            );
            background-size: 400% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Dramatic Glow Styling */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
            
            /* Animations running in parallel */
            animation: rainbowShift 4s linear infinite, cinematicScale 3s forwards;
        }

        /* Infinite Rainbow Shift Loop */
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* Subtle Cinema Camera Zoom Scale Effect */
        @keyframes cinematicScale {
            0% { transform: scale(0.92); opacity: 0; filter: blur(4px); }
            15% { opacity: 1; filter: blur(0); }
            85% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1.08); opacity: 0; }
        }

        /* State trigger to cleanly dissolve overlay */
        .cinematic-intro.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* --- TITLE HEADER BANNER --- */
        .app-header {
            background-color: var(--office-blue);
            color: white;
            padding: 0 16px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* --- CONTROL RIBBON --- */
        .ribbon-container {
            background-color: #faf9f8;
            border-bottom: 1px solid var(--border-muted);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            position: relative
