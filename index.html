<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Docs - Word Processor</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for Office 365 Theme */
        :root {
            --primary-blue: #2b579a;
            --ribbon-bg: #f3f2f1;
            --toolbar-bg: #ffffff;
            --border-color: #e1dfdd;
            --page-bg: #eaeaea;
            --text-color: #323130;
            --hover-color: #e1dfdd;
            --active-color: #c8c6c4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-color);
            overflow: hidden; /* Prevent body scroll, handle in workspace */
        }

        /* --- CINEMATIC INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutScreen 0.5s ease 3.5s forwards;
        }

        .cinematic-text {
            font-size: 10vw;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(
                90deg, 
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
            );
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 2s linear infinite, scaleUp 3.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes scaleUp {
            0% { transform: scale(0.8); opacity: 0; filter: blur(10px); }
            20% { opacity: 1; filter: blur(0px); }
            80% { opacity: 1; transform: scale(1.1); filter: blur(0px); }
            100% { opacity: 0; transform: scale(1.2); filter: blur(5px); }
        }
        @keyframes fadeOutScreen { to { opacity: 0; visibility: hidden; } }

        /* --- MAIN APP UI --- */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            animation: fadeInApp 1s ease 3.8s forwards;
        }
        @keyframes fadeInApp { to { opacity: 1; } }

        /* Top Header */
        .header {
            background-color: var(--primary-blue);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .header .app-name { font-weight: 600; letter-spacing: 1px; }

        /* Ribbon Toolbar */
        .ribbon {
            background-color: var(--ribbon-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .ribbon-tabs {
            display: flex;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
        }
        .tab {
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            border-bottom: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-weight: 600;
        }
        
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 8px 16px;
            background-color: var(--ribbon-bg);
            align-items: center;
        }

        /* Tool groups and buttons */
        .tool-group {
            display: flex;
            align-items: center;
            gap: 2px;
            border-right: 1px solid var(--active-color);
            padding-right: 10px;
            margin-right: 5px;
        }

        .tool-btn {
            background: none;
            border: 1px solid transparent;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 14px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .tool-btn:hover { background-color: var(--hover-color); }
        .tool-btn:active { background-color: var(--active-color); }
        .tool-btn.bold { font-weight: bold; }
        .tool-btn.italic { font-style: italic; }
        .tool-btn.underline { text-decoration: underline; }

        select, input[type="color"] {
            padding: 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            cursor: pointer;
            height: 30px;
        }

        /* Workspace & Page */
        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            background-color: #e2e2e2;
        }

        .page {
            background-color: white;
            width: 100%;
            max-width: 816px; /* standard 8.5x11 aspect ratio width */
            min-height: 1056px;
            padding: 96px; /* 1-inch margins */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            outline: none;
            font-family: 'Arial', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            color: #000;
        }

        .page img {
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }

        /* Hidden File Input */
        #img-upload { display: none; }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .workspace { padding: 10px; }
            .page { padding: 30px; min-height: 800px; }
            .tool-group { border-right: none; padding-right: 0; margin-right: 0; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="cinematic-text">ANTIFY</div>
    </div>

    <div id="app-container">
        
        <div class="header">
            <span class="app-name">Antify Docs</span>
            <span>Document1 - Saved locally</span>
        </div>

        <div class="ribbon">
            <div class="ribbon-tabs">
                <div class="tab active">Home</div>
                <div class="tab" onclick="document.getElementById('img-upload').click()">Insert Image</div>
                <div class="tab" onclick="insertChartPlaceholder()">Insert Chart</div>
            </div>
            
            <div class="toolbar">
                <div class="tool-group">
                    <select id="fontName" onchange="formatDoc('fontName', this.value)">
                        <option value="Arial">Arial</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Courier New">Courier New</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Comic Sans MS">Comic Sans</option>
                    </select>
                    <select id="fontSize" onchange="formatDoc('fontSize', this.value)">
                        <option value="1">Small</option>
                        <option value="3" selected>Normal</option>
                        <option value="5">Large</option>
                        <option value="7">Huge</option>
                    </select>
                </div>

                <div class="tool-group">
                    <button class="tool-btn bold" onclick="formatDoc('bold')" title="Bold">B</button>
                    <button class="tool-btn italic" onclick="formatDoc('italic')" title="Italic">I</button>
                    <button class="tool-btn underline" onclick="formatDoc('underline')" title="Underline">U</button>
                    <button class="tool-btn" onclick="formatDoc('strikeThrough')" title="Strikethrough"><s>S</s></button>
                </div>

                <div class="tool-group">
                    <label style="font-size:12px; margin-right:4px;">Text</label>
                    <input type="color" onchange="formatDoc('foreColor', this.value)" title="Text Color">
                    <label style="font-size:12px; margin-left:8px; margin-right:4px;">Highlight</label>
                    <input type="color" value="#ffff00" onchange="formatDoc('hiliteColor', this.value)" title="Highlight Color">
                </div>

                <div class="tool-group">
                    <button class="tool-btn" onclick="formatDoc('justifyLeft')" title="Align Left">⫷</button>
                    <button class="tool-btn" onclick="formatDoc('justifyCenter')" title="Align Center">☰</button>
                    <button class="tool-btn" onclick="formatDoc('justifyRight')" title="Align Right">⫸</button>
                    <button class="tool-btn" onclick="formatDoc('justifyFull')" title="Justify">▤</button>
                </div>

                <div class="tool-group">
                    <button class="tool-btn" onclick="formatDoc('insertUnorderedList')" title="Bullet List">• List</button>
                    <button class="tool-btn" onclick="formatDoc('insertOrderedList')" title="Numbered List">1. List</button>
                </div>
            </div>
        </div>

        <input type="file" id="img-upload" accept="image/*">

        <div class="workspace">
            <div class="page" id="editor" contenteditable="true" spellcheck="true">
                <br>
            </div>
        </div>
    </div>

    <script>
        // Main function to apply formatting
        function formatDoc(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
        }

        // Focus editor on load
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('editor').focus();
            }, 4000); // Wait for cinematic intro to finish
        }

        // Handle Image Upload and insertion into the document
        document.getElementById('img-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Create an image element visually
                    const imgUrl = e.target.result;
                    // Insert into cursor position
                    formatDoc('insertImage', imgUrl);
                }
                reader.readAsDataURL(file);
            }
            // Reset input so the same image can be uploaded again if needed
            this.value = '';
        });

        // Placeholder for Chart Generation
        function insertChartPlaceholder() {
            // Because real dynamic charts require heavy libraries like Chart.js,
            // we will insert a generic visual table as a placeholder for standalone static environments.
            const chartHtml = `
                <br>
                <table border="1" style="width:100%; border-collapse: collapse; text-align:center;">
                    <tr style="background:#2b579a; color:white;">
                        <th>Category</th><th>Value 1</th><th>Value 2</th>
                    </tr>
                    <tr><td>Item A</td><td>40%</td><td>60%</td></tr>
                    <tr><td>Item B</td><td>20%</td><td>80%</td></tr>
                    <tr><td>Item C</td><td>55%</td><td>45%</td></tr>
                </table>
                <p style="font-size:12px; color:gray; text-align:center;">[Placeholder for external Chart Integration]</p>
                <br>
            `;
            formatDoc('insertHTML', chartHtml);
        }

        // Prevent standard tab behavior (which leaves the page) and insert spacing instead
        document.getElementById('editor').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                formatDoc('insertHTML', '&nbsp;&nbsp;&nbsp;&nbsp;');
            }
        });
    </script>
</body>
</html>
