<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antify Docs - Premium Word Processor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --ms-blue: #185abd;
            --ribbon-bg: #f3f2f1;
            --toolbar-bg: #ffffff;
            --border-color: #d2d0ce;
            --page-bg: #eaeaea;
            --text-dark: #323130;
            --hover-bg: #edebe9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Open Sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
        }

        /* --- APP CONTAINER SYSTEM --- */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            background-color: var(--ms-blue);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
        }

        .ribbon {
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .ribbon-tabs {
            display: flex;
            background: #faf9f8;
            padding-left: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            color: #595959;
            border-bottom: 3px solid transparent;
            user-select: none;
        }

        .tab.active {
            border-bottom: 3px solid var(--ms-blue);
            color: var(--ms-blue);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 16px;
            background-color: var(--ribbon-bg);
            align-items: center;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 4px;
            border-right: 1px solid #d2d0ce;
            padding-right: 10px;
            margin-right: 4px;
        }

        .tool-btn {
            background: transparent;
            border: 1px solid transparent;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-dark);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background-color: var(--hover-bg);
            border: 1px solid #c8c6c4;
        }

        select {
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            font-family: inherit;
            font-size: 13px;
            height: 32px;
            outline: none;
        }

        /* WORKSPACE VIEWPORT */
        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .page {
            background-color: white;
            width: 100%;
            max-width: 812px;
            min-height: 1048px;
            padding: 90px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            outline: none;
            font-size: 16px;
            line-height: 1.6;
            color: #000000;
            word-wrap: break-word;
        }
